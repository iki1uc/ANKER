<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ANKER – S01 · iki1uc</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#0f0; letter-spacing:4px; margin-bottom:30px; }
.block { background:#111; border:1px solid #333; padding:25px; margin-bottom:30px; border-radius:8px; }
.title { font-size:22px; color:#6cf; margin-bottom:10px; }
pre { background:#000; border-left:3px solid #6cf; padding:15px; margin-top:10px; white-space:pre-wrap; }
a { color:#6cf; text-decoration:none; font-weight:bold; }
</style>

<!-- SYSTEM MODULES -->
<script src="../HH/cr/RESPO.core.js"></script>
<script src="../HH/cr/AXI.core.js"></script>
<script src="../HH/cr/TEM.core.js"></script>
<script src="../HH/cr/RUN8.core.js"></script>

</head>

<body>

<h1>ANKER – S01 · iki1uc</h1>

<div class="block">
    <div class="title">Stabilisationsachse</div>
    <p id="axis-status">Lade Achsen…</p>
</div>

<div class="block">
    <div class="title">Identität</div>
    <p><a href="ID.html">→ ANKER‑Identität öffnen</a></p>
</div>

<div class="block">
    <div class="title">Stabilisierte Achsen</div>
    <pre id="axis-list"></pre>
</div>

<div class="block">
    <div class="title">RESPO‑Status</div>
    <pre id="respo-status"></pre>
</div>

<script>
(async function () {

    // ANKER Daten laden
    const anker = await fetch("ANKER.json").then(r => r.json()).catch(() => null);

    // Achsen aus ANKER.raw
    const raw = await fetch("ANKER.raw").then(r => r.text()).catch(() => "");

    // Achsenliste anzeigen
    document.getElementById("axis-list").innerText = raw || "Keine Achsen gefunden";

    // AXI Engine
    const axi = AXI_CORE();
    document.getElementById("axis-status").innerText =
        axi ? "Achsen stabil" : "Achsenfehler";

    // RESPO Bewertung
    const respo = RESPO_CORE(anker || {});
    document.getElementById("respo-status").innerText =
        `Score: ${respo.score}\nStatus: ${respo.ok ? "STABIL" : "KRITISCH"}`;

})();
</script>

</body>
</html>
