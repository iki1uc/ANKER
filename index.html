<pre id="anker"></pre>

<script type="module">
  import { ID_NEUTRAL } from "../ID/IDneutral.js";

  async function load(){
    const json = await fetch("./ANKER.json").then(r => r.json());

    let out = "ANKER :: FINAL\n-------------------------\n";

    out += `ID        → ${json.id}\n`;
    out += `ID-Typ    → ${json.id_type}\n`;
    out += `Axis      → ${json.axis}\n`;
    out += `Gen       → ${json.gen}\n`;
    out += `EIC       → ${json.eic}\n`;
    out += `State     → ${json.state}\n`;
    out += `Switch    → ${json.switch}\n\n`;

    out += "NEUTRAL-MODUS (ID_NEUTRAL)\n";
    out += `Mode      → ${ID_NEUTRAL.mode}\n`;
    out += `Behavior  → ${ID_NEUTRAL.behavior}\n`;
    out += `Active    → ${ID_NEUTRAL.active}\n`;

    document.getElementById("anker").textContent = out;
  }

  load();
</script>
